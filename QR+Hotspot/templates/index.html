<!DOCTYPE html>
<html>
    <head>
        <title>Job Viewer</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                margin-top: 50px;
            }

            button {
                font-size: 30px;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <h1 id="name">Loading...</h1>
        <p id="class"></p>
        <p id="section"></p>
        <p id="meal"></p>
        <p id="status"></p>

        <button onclick="sendOK()">OK</button>

        <script>
            async function refreshData() {
                const response = await fetch('/current');
                const data = await response.json();

                document.getElementById('name').innerText = data.name;
                document.getElementById('part').innerText = 'Part: ' + data.part;
                document.getElementById('status').innerText = 'Status: ' + data.status;
            }

            async function sendOK() {
                await fetch('/ok', { method: 'POST' });
                refreshData();
            }

            refreshData();
            setInterval(refreshData, 1000);
        </script>
    </body>
</html>
